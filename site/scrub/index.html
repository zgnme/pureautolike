  <script>
    const surface = document.getElementById('scrubSurface');
    const video = document.getElementById('scrubVideo');
    const scrubControl = document.getElementById('scrubControl');
    const wordmark = document.querySelector('.brand-wordmark');
    const compactMedia = window.matchMedia('(max-width: 767px)');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const SEEK_EPSILON = 1 / 60;
    const FOLLOW_RESPONSE = 9;
    const MAX_FOLLOW_SPEED_RATIO = 0.5;
    const SNAP_DISTANCE = 1 / 240;
    const VIDEO_SOURCES = {
      safariAlpha: {
        desktop: {
          src: '../assets/videos/interactive-scrub-cutout-desktop-fast-720-hevc.mov?v=pages3',
          type: 'video/mp4; codecs="hvc1"'
        },
        mobile: {
          src: '../assets/videos/interactive-scrub-cutout-mobile-fast-540-hevc.mov?v=pages3',
          type: 'video/mp4; codecs="hvc1"'
        }
      },
      webmAlpha: {
        desktop: {
          src: '../assets/videos/interactive-scrub-cutout-desktop-fast-720.webm?v=pages3',
          type: 'video/webm; codecs="vp9"'
        },
        mobile: {
          src: '../assets/videos/interactive-scrub-cutout-mobile-fast-540.webm?v=pages3',
          type: 'video/webm; codecs="vp9"'
        }
      }
    };
    const VIDEO_POSTERS = {
      desktop: '../assets/posters/interactive-scrub-poster-desktop-900.png?v=pages2',
      mobile: '../assets/posters/interactive-scrub-poster-mobile-540.png?v=pages2'
    };

    let duration = 0;
    let targetTime = 0;
    let smoothTime = 0;
    let isActive = false;
    let hasInteracted = false;
    let lastPointerX = null;
    let rafId = 0;
    let lastFrameTime = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setTargetFromClientX(clientX) {
      hasInteracted = true;
      if (!duration) return;
      const rect = surface.getBoundingClientRect();
      const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
      targetTime = ratio * duration;
      wordmark.style.setProperty('--wordmark-shift', `${(ratio - 0.5) * 48}px`);
      wordmark.style.setProperty('--wordmark-tilt', `${(ratio - 0.5) * 1.4}deg`);
      ensureScrubLoop();
    }

    function paintProgress() {
      const ratio = duration ? clamp(smoothTime / duration, 0, 1) : 0;
      const percent = ratio * 100;
      scrubControl.style.setProperty('--scrub-progress', `${percent}%`);
      const roundedPercent = String(Math.round(percent));
      if (scrubControl.getAttribute('aria-valuenow') !== roundedPercent) {
        scrubControl.setAttribute('aria-valuenow', roundedPercent);
      }
    }

    function prefersAppleAlphaVideo() {
      const ua = navigator.userAgent;
      const isIOS = /iPad|iPhone|iPod/i.test(ua)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isDesktopSafari = /Safari/i.test(ua)
        && !/Chrome|Chromium|CriOS|FxiOS|Edg|OPR|Android/i.test(ua);
      return isIOS || isDesktopSafari;
    }

    function setVideoSource(sourceKey) {
      const sizeKey = compactMedia.matches ? 'mobile' : 'desktop';
      const sourceConfig = VIDEO_SOURCES[sourceKey][sizeKey];
      stopScrubLoop();
      duration = 0;
      targetTime = 0;
      smoothTime = 0;
      video.dataset.activeSource = sourceKey;
      video.dataset.activeSize = sizeKey;
      delete video.dataset.mediaError;
      video.textContent = '';
      video.poster = VIDEO_POSTERS[sizeKey];

      const source = document.createElement('source');
      source.src = sourceConfig.src;
      source.type = sourceConfig.type;
      video.append(source);
      video.load();
    }

    function selectInitialVideoSource() {
      setVideoSource(prefersAppleAlphaVideo() ? 'safariAlpha' : 'webmAlpha');
    }

    function handleVideoError() {
      stopScrubLoop();
      duration = 0;
      video.dataset.mediaError = 'true';
    }

    function stopScrubLoop() {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }
      lastFrameTime = 0;
    }

    function startScrubLoop() {
      if (document.hidden) return;
      if (!rafId && !video.seeking) {
        lastFrameTime = performance.now();
        rafId = requestAnimationFrame(tick);
      }
    }

    function ensureScrubLoop() {
      startScrubLoop();
    }

    function restoreScrubState() {
      if (document.hidden) return;
      const restoredDuration = Number.isFinite(video.duration) ? video.duration : duration;
      duration = restoredDuration || duration;

      if (duration) {
        targetTime = clamp(targetTime, 0, duration);
        smoothTime = clamp(smoothTime || targetTime || duration * 0.5, 0, duration);
        video.pause();

        if (hasInteracted && video.readyState >= 1 && Math.abs(video.currentTime - smoothTime) > SEEK_EPSILON) {
          video.currentTime = smoothTime;
        }
        paintProgress();
      }

      if (hasInteracted) ensureScrubLoop();
    }

    function tick(now = performance.now()) {
      rafId = 0;
      if (document.hidden || !duration || video.seeking) return;

      if (!lastFrameTime) lastFrameTime = now;
      const deltaSeconds = clamp((now - lastFrameTime) / 1000, 1 / 120, 1 / 30);
      lastFrameTime = now;
      const distance = targetTime - smoothTime;
      let isSettled = Math.abs(distance) < SNAP_DISTANCE;

      if (prefersReducedMotion || isSettled) {
        smoothTime = targetTime;
        isSettled = true;
      } else {
        const responseStep = distance * (1 - Math.exp(-FOLLOW_RESPONSE * deltaSeconds));
        const maxStep = duration * MAX_FOLLOW_SPEED_RATIO * deltaSeconds;
        smoothTime += clamp(responseStep, -maxStep, maxStep);
      }

      const nextTime = clamp(smoothTime, 0, duration);
      if (Math.abs(video.currentTime - nextTime) > SEEK_EPSILON) {
        video.currentTime = nextTime;
      }
      paintProgress();

      if (!isSettled && !video.seeking) {
        rafId = requestAnimationFrame(tick);
      } else if (isSettled) {
        lastFrameTime = 0;
      }
    }

    function primeVideo() {
      duration = Number.isFinite(video.duration) ? video.duration : 0;
      targetTime = duration * 0.5;
      smoothTime = targetTime;
      lastFrameTime = 0;
      wordmark.style.setProperty('--wordmark-shift', '0px');
      wordmark.style.setProperty('--wordmark-tilt', '0deg');
      video.pause();
      paintProgress();
    }

    video.addEventListener('loadedmetadata', primeVideo);
    video.addEventListener('canplay', () => video.pause());
    video.addEventListener('seeked', ensureScrubLoop);
    video.addEventListener('error', handleVideoError);

    surface.addEventListener('pointerenter', event => {
      isActive = true;
      lastPointerX = event.clientX;
    });

    surface.addEventListener('pointermove', event => {
      if (event.pointerType === 'touch') {
        if (isActive || event.buttons) setTargetFromClientX(event.clientX);
        return;
      }

      if (lastPointerX === null) {
        lastPointerX = event.clientX;
        return;
      }

      const pointerDelta = Math.abs(event.clientX - lastPointerX);
      lastPointerX = event.clientX;
      if (pointerDelta >= 0.5 || event.buttons) {
        setTargetFromClientX(event.clientX);
      }
    });

    surface.addEventListener('pointerdown', event => {
      isActive = true;
      lastPointerX = event.clientX;
      surface.classList.add('is-scrubbing');
      surface.setPointerCapture?.(event.pointerId);
      setTargetFromClientX(event.clientX);
    });

    surface.addEventListener('pointerup', event => {
      isActive = false;
      surface.classList.remove('is-scrubbing');
      surface.releasePointerCapture?.(event.pointerId);
    });

    surface.addEventListener('pointerleave', () => {
      isActive = false;
      lastPointerX = null;
      surface.classList.remove('is-scrubbing');
    });

    surface.addEventListener('pointercancel', () => {
      isActive = false;
      lastPointerX = null;
      surface.classList.remove('is-scrubbing');
    });

    scrubControl.addEventListener('keydown', event => {
      if (!duration) return;
      hasInteracted = true;
      const step = duration / 24;
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        targetTime = clamp(targetTime - step, 0, duration);
        ensureScrubLoop();
      }
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        targetTime = clamp(targetTime + step, 0, duration);
        ensureScrubLoop();
      }
      if (event.key === 'Home') {
        event.preventDefault();
        targetTime = 0;
        ensureScrubLoop();
      }
      if (event.key === 'End') {
        event.preventDefault();
        targetTime = duration;
        ensureScrubLoop();
      }
    });

    window.addEventListener('pageshow', restoreScrubState);
    window.addEventListener('focus', restoreScrubState);
    window.addEventListener('pagehide', stopScrubLoop);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopScrubLoop();
      } else {
        restoreScrubState();
      }
    });

    compactMedia.addEventListener?.('change', () => {
      const expectedSize = compactMedia.matches ? 'mobile' : 'desktop';
      if (video.dataset.activeSize !== expectedSize) {
        selectInitialVideoSource();
      }
    });

    selectInitialVideoSource();
  </script>
</body>
</html>

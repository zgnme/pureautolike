name: Bug report
description: Report a problem in the PureAutoLike extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste Pure account tokens, Telegram bot tokens, chat IDs, private messages, payment data, or screenshots with private profile data.
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126, Edge 126, etc.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: PureAutoLike version
      placeholder: 0.1.32
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Pure Web
        2. Open PureAutoLike
        3. Click ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auto like
        - Hidden photo opener
        - Telegram notifications
        - Timers
        - Profile capture export
        - License / beta access
        - Popup UI
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Safe logs or screenshots
      description: Remove private data before attaching anything.
      render: text

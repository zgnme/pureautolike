name: Telegram feedback notifications

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  discussion:
    types: [created, answered]
  discussion_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      message:
        description: Test message text
        required: false
        default: Manual notification test

permissions:
  contents: read
  issues: read
  pull-requests: read
  discussions: read

jobs:
  notify:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
    steps:
      - name: Skip when Telegram secrets are not configured
        if: ${{ env.TELEGRAM_BOT_TOKEN == '' || env.TELEGRAM_CHAT_ID == '' }}
        run: |
          echo "Telegram secrets are not configured. Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID to enable notifications."

      - name: Send Telegram message
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          WORKFLOW_DISPATCH_MESSAGE: ${{ inputs.message }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const token = process.env.TELEGRAM_BOT_TOKEN;
          const chatId = process.env.TELEGRAM_CHAT_ID;
          const threadId = process.env.TELEGRAM_THREAD_ID;
          const eventName = process.env.GITHUB_EVENT_NAME;
          const payload = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));

          function escapeHtml(value) {
            return String(value || '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;');
          }

          function compact(value, max = 900) {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (text.length <= max) return text;
            return `${text.slice(0, max - 1)}...`;
          }

          function eventSummary() {
            const repo = payload.repository && payload.repository.full_name ? payload.repository.full_name : process.env.GITHUB_REPOSITORY;
            const sender = payload.sender && payload.sender.login ? payload.sender.login : process.env.GITHUB_ACTOR;
            const action = payload.action || 'manual';

            if (eventName === 'workflow_dispatch') {
              return {
                label: 'Manual test',
                title: process.env.WORKFLOW_DISPATCH_MESSAGE || 'Manual notification test',
                body: '',
                url: payload.repository && payload.repository.html_url,
                repo,
                sender
              };
            }

            if (eventName === 'issues' && payload.issue) {
              return {
                label: `Issue ${action}`,
                title: `#${payload.issue.number} ${payload.issue.title}`,
                body: payload.issue.body,
                url: payload.issue.html_url,
                repo,
                sender
              };
            }

            if (eventName === 'issue_comment' && payload.issue && payload.comment) {
              const kind = payload.issue.pull_request ? 'Pull request comment' : 'Issue comment';
              return {
                label: `${kind} ${action}`,
                title: `#${payload.issue.number} ${payload.issue.title}`,
                body: payload.comment.body,
                url: payload.comment.html_url,
                repo,
                sender
              };
            }

            if (eventName === 'discussion' && payload.discussion) {
              return {
                label: `Discussion ${action}`,
                title: `#${payload.discussion.number} ${payload.discussion.title}`,
                body: payload.discussion.body,
                url: payload.discussion.html_url,
                repo,
                sender
              };
            }

            if (eventName === 'discussion_comment' && payload.discussion && payload.comment) {
              return {
                label: `Discussion comment ${action}`,
                title: `#${payload.discussion.number} ${payload.discussion.title}`,
                body: payload.comment.body,
                url: payload.comment.html_url,
                repo,
                sender
              };
            }

            return {
              label: `${eventName} ${action}`,
              title: 'Repository activity',
              body: '',
              url: payload.repository && payload.repository.html_url,
              repo,
              sender
            };
          }

          const summary = eventSummary();
          const lines = [
            '<b>PureAutoLike feedback</b>',
            `<b>${escapeHtml(summary.label)}</b>`,
            escapeHtml(summary.title),
            `Repo: <code>${escapeHtml(summary.repo)}</code>`,
            `By: <code>${escapeHtml(summary.sender)}</code>`,
            summary.body ? `\n${escapeHtml(compact(summary.body))}` : '',
            summary.url ? `\n<a href="${escapeHtml(summary.url)}">Open on GitHub</a>` : ''
          ];

          const requestBody = {
            chat_id: chatId,
            text: lines.filter(Boolean).join('\n'),
            parse_mode: 'HTML',
            disable_web_page_preview: true
          };
          if (threadId) requestBody.message_thread_id = Number(threadId);

          const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(requestBody)
          });
          const responseText = await response.text();
          if (!response.ok) {
            throw new Error(`Telegram sendMessage failed: ${response.status} ${responseText}`);
          }
          NODE
